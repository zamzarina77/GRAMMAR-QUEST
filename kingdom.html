<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grammar Kingdom</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/kingdom.css">

</head>

<body>

<!-- BACKGROUND -->

<div class="background-stars"></div>
<div class="background-mist"></div>

<!-- MAIN CONTAINER -->

<div class="game-container">

    <!-- ===================================
         HEADER
    ==================================== -->

    <header class="top-header">

        <!-- LEFT -->

        <div class="header-left">

            <img
                src="images/characters/professor-hoot.png"
                id="header-hoot"
                alt="Professor Hoot">

            <div class="crystal-box">

                <span>💎</span>

                <div>

                    <small>Crystals</small>

                    <h3>0 / 5</h3>

                </div>

            </div>

        </div>

        <!-- CENTRE -->

        <div class="header-centre">

            <h1>GRAMMAR KINGDOM</h1>

            <p>
                Choose your destination.
                Recover every Grammar Crystal.
            </p>

        </div>

        <!-- RIGHT -->

        <div class="header-right">

            <div class="level-box">

                <span>👑</span>

                <div>

                    <small>Adventurer</small>

                    <h3>Level 1</h3>

                </div>

            </div>

        </div>

    </header>

    <!-- ===================================
          MAP
    ==================================== -->

    <main class="kingdom-map">

        <button class="kingdom forest">

            🌳

            <span>Whispering Forest</span>

        </button>

        <button class="kingdom castle">

            🏰

            <span>Grammar Castle</span>

        </button>

        <button class="kingdom palace">

            💎

            <span>Prism Palace 🔒</span>

        </button>

        <button class="kingdom volcano">

            🌋

            <span>Ember Volcano 🔒</span>

        </button>

        <button class="kingdom tide">

            🌙

            <span>Tide of Time 🔒</span>

        </button>

    </main>

    <!-- ===================================
         FOOTER
    ==================================== -->

    <footer class="bottom-bar">

        <div class="progress">

            <span>Your Progress</span>

            <div class="progress-bar">

                <div class="progress-fill"></div>

            </div>

        </div>

        <div class="buttons">

            <button>🎵</button>

            <button>🏆</button>

            <button>⚙️</button>

        </div>

    </footer>

</div>

</body>

</html>
