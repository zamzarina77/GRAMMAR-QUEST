<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Grammar Quest: Restore the Lost Kingdom</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Animated Background -->

    <div class="stars"></div>

    <div class="moon"></div>

    <div class="castle"></div>

    <!-- Intro Screen -->

    <section id="intro-screen">

        <div class="intro-container">

            <!-- Professor Hoot -->

            <div class="character-section">

                <img
                    id="hoot"
                    src="images/characters/professor-hoot.png"
                    alt="Professor Hoot">

            </div>

            <!-- Dialogue Panel -->

            <div class="dialogue-panel">

                <div class="character-name">

                    <h2>Professor Hoot</h2>

                    <p>Guardian of the Grammar Kingdom</p>

                </div>

                <div id="dialogue-box">

                    <p id="dialogue-text"></p>

                </div>

                <!-- Hidden until dialogue ends -->

                <button id="acceptBtn">

                    ⚔️ YES, I ACCEPT THE QUEST!

                </button>

            </div>

        </div>

    </section>

    <script src="js/intro.js"></script>

</body>

</html>
